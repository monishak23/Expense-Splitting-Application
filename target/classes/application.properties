# Server Configuration
server.port=8080
spring.application.name=expense-splitter

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/expensesplit
spring.datasource.username=root
spring.datasource.password=javadbms
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Flyway
spring.flyway.enabled=true

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production-please
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:4200