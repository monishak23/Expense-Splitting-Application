# Server Configuration
server.port=8080
spring.application.name=expense-splitter

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/expense_splitter
spring.datasource.username=postgres
spring.datasource.password=javadbms
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production-please
jwt.expiration=86400000

# CORS
cors.allowed.origins=http://localhost:4200